name: Daily Albuhuti Data Pipeline

on:
  schedule:
    # This runs every day at 02:00 UTC. Adjust the numbers to change the time.
    # Format is: minute hour day month day-of-week (UTC time)
    - cron: '0 2 * * *' 
  workflow_dispatch: # This allows you to also trigger it manually with a button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Or whichever version you prefer

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          # This pulls your secret into the script
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
